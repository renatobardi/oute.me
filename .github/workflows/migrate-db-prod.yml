name: Migrate DB PROD

# Trigger exclusivamente manual — nunca roda automaticamente.
# Requer aprovação do environment "production" no GitHub antes de aplicar.
#
# Secret necessário no Secret Manager:
#   DATABASE_URL_PROD_MIGRATE = postgresql://USER:PASS@/oute_production?host=/cloudsql/PROJECT:REGION:INSTANCE
#
# Configuração do GitHub Environment "production":
#   Settings → Environments → production → Required reviewers: <seu usuário>

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a executar'
        required: true
        default: 'up'
        type: choice
        options:
          - up
          - status
          - dry-run
      version:
        description: 'Versão para reverter (apenas para down — ex: 012_user_activation)'
        required: false
        default: ''

concurrency:
  group: migrate-prod
  cancel-in-progress: false

env:
  GCP_REGION: us-central1
  CLOUD_SQL_INSTANCE: oute-postgres
  PNPM_VERSION: 10.30.3
  NODE_VERSION: 24

permissions:
  contents: read
  id-token: write

jobs:
  status-check:
    name: Status antes da aprovação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Cloud SQL Auth Proxy (Unix socket)
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mkdir -p /cloudsql
          sudo chmod 777 /cloudsql
          ./cloud-sql-proxy \
            --unix-socket=/cloudsql \
            ${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:${{ env.CLOUD_SQL_INSTANCE }} &
          sleep 3

      - name: Fetch DATABASE_URL
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=DATABASE_URL_PROD_MIGRATE)
          echo "::add-mask::${DB_URL}"
          echo "DATABASE_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Status atual (PROD)
        run: pnpm migrate:status

      - name: Dry-run (prévia do que seria aplicado)
        run: pnpm migrate:dry

  apply:
    name: Aplicar migrations (PROD)
    runs-on: ubuntu-latest
    needs: status-check
    # Gate de aprovação: exige reviewer configurado no environment "production"
    environment: production
    if: ${{ inputs.action == 'up' }}

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Cloud SQL Auth Proxy (Unix socket)
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mkdir -p /cloudsql
          sudo chmod 777 /cloudsql
          ./cloud-sql-proxy \
            --unix-socket=/cloudsql \
            ${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:${{ env.CLOUD_SQL_INSTANCE }} &
          sleep 3

      - name: Fetch DATABASE_URL
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=DATABASE_URL_PROD_MIGRATE)
          echo "::add-mask::${DB_URL}"
          echo "DATABASE_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Aplicar migrations
        run: pnpm migrate up

      - name: Status após aplicação
        if: always()
        run: pnpm migrate:status

  rollback:
    name: Reverter migration (PROD)
    runs-on: ubuntu-latest
    needs: status-check
    environment: production
    if: ${{ inputs.action == 'up' && inputs.version != '' }}

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Cloud SQL Auth Proxy (Unix socket)
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mkdir -p /cloudsql
          sudo chmod 777 /cloudsql
          ./cloud-sql-proxy \
            --unix-socket=/cloudsql \
            ${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:${{ env.CLOUD_SQL_INSTANCE }} &
          sleep 3

      - name: Fetch DATABASE_URL
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=DATABASE_URL_PROD_MIGRATE)
          echo "::add-mask::${DB_URL}"
          echo "DATABASE_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Reverter migration
        run: pnpm migrate down ${{ inputs.version }}

      - name: Status após reversão
        if: always()
        run: pnpm migrate:status
