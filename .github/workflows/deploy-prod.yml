name: Deploy PROD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_REGION: us-central1
  AR_REPO: oute

permissions:
  contents: read
  id-token: write

jobs:
  deploy-web:
    name: Deploy Web (PROD)
    runs-on: ubuntu-latest
    needs: [deploy-ai]
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push container
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          docker build \
            -f apps/web/Dockerfile \
            --build-arg PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }} \
            --build-arg PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.GCP_PROJECT_ID }}.firebaseapp.com \
            --build-arg PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
            --build-arg PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:latest \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web --all-tags

      - name: Get AI service URL
        id: ai-url
        run: |
          URL=$(gcloud run services describe oute-ai-prod --region=${{ env.GCP_REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: oute-web-prod
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:${{ github.sha }}
          traffic: 100
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --timeout=300s
            --concurrency=80
            --allow-unauthenticated
            --vpc-connector=oute-vpc-connector
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:oute-postgres
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            NODE_ENV=production
            FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }}
            PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.GCP_PROJECT_ID }}.firebaseapp.com
            AI_SERVICE_URL=${{ steps.ai-url.outputs.url }}
            PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
          secrets: |
            DATABASE_URL=DATABASE_URL_PROD:latest

      - name: Route 100% traffic to new web revision
        run: |
          gcloud run services update-traffic oute-web-prod \
            --region=${{ env.GCP_REGION }} \
            --to-latest

  deploy-ai:
    name: Deploy AI (PROD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push container
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          docker build \
            -f apps/ai/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:latest \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai --all-tags

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: oute-ai-prod
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:${{ github.sha }}
          flags: |
            --memory=2Gi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --timeout=300s
            --concurrency=10
            --no-allow-unauthenticated
            --vpc-connector=oute-vpc-connector
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:oute-postgres
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            ENVIRONMENT=production
            GOOGLE_CLOUD_STORAGE_BUCKET=oute-prod-uploads
          secrets: |
            DATABASE_URL=DATABASE_URL_PROD:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            REDIS_URL=REDIS_URL:latest

      - name: Route 100% traffic to new AI revision
        run: |
          gcloud run services update-traffic oute-ai-prod \
            --region=${{ env.GCP_REGION }} \
            --to-latest

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-ai]
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Wait for services to stabilize
        run: sleep 15

      - name: Check web health
        run: |
          URL=$(gcloud run services describe oute-web-prod --region=${{ env.GCP_REGION }} --format='value(status.url)')
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/")
            echo "Attempt ${i}: Web health: ${STATUS}"
            if [[ "$STATUS" -ge 200 && "$STATUS" -lt 400 ]]; then
              echo "Web service is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Web service health check failed"
          exit 1

      - name: Check AI health
        run: |
          URL=$(gcloud run services describe oute-ai-prod --region=${{ env.GCP_REGION }} --format='value(status.url)')
          TOKEN=$(gcloud auth print-identity-token --impersonate-service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} --audiences="${URL}" 2>/dev/null || true)
          for i in 1 2 3; do
            if [[ -n "$TOKEN" ]]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${TOKEN}" "${URL}/health/services")
            else
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health/services")
            fi
            echo "Attempt ${i}: AI health: ${STATUS}"
            if [[ "$STATUS" -ge 200 && "$STATUS" -lt 500 ]]; then
              echo "AI service is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "AI service health check failed"
          exit 1

      - name: Verify security headers
        run: |
          URL=$(gcloud run services describe oute-web-prod --region=${{ env.GCP_REGION }} --format='value(status.url)')
          HEADERS=$(curl -sI "${URL}/")
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options: nosniff" || { echo "Missing X-Content-Type-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "x-frame-options: deny" || { echo "Missing X-Frame-Options"; exit 1; }
          echo "Security headers verified"

      - name: Verify oute.pro redirect
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://oute.pro/" 2>/dev/null || echo "000")
          echo "oute.pro status: ${STATUS}"
          if [[ "$STATUS" == "301" ]]; then
            LOCATION=$(curl -sI --max-time 10 "https://oute.pro/" 2>/dev/null | grep -i "^location:" | tr -d '\r')
            echo "Redirect location: ${LOCATION}"
            echo "oute.pro redirect verified"
          elif [[ "$STATUS" == "000" ]]; then
            echo "Skipping oute.pro domain check (DNS may not be configured yet)"
          else
            echo "Expected 301 redirect from oute.pro, got ${STATUS}"
            exit 1
          fi

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Rollback web service
        run: |
          echo "Rolling back oute-web-prod to previous revision..."
          PREV_REV=$(gcloud run revisions list \
            --service=oute-web-prod \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --sort-by=~creationTimestamp \
            --limit=2 | tail -1)
          if [[ -n "$PREV_REV" ]]; then
            gcloud run services update-traffic oute-web-prod \
              --region=${{ env.GCP_REGION }} \
              --to-revisions="$PREV_REV=100"
            echo "Rolled back to: $PREV_REV"
          else
            echo "No previous revision found for rollback"
          fi

      - name: Rollback AI service
        run: |
          echo "Rolling back oute-ai-prod to previous revision..."
          PREV_REV=$(gcloud run revisions list \
            --service=oute-ai-prod \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --sort-by=~creationTimestamp \
            --limit=2 | tail -1)
          if [[ -n "$PREV_REV" ]]; then
            gcloud run services update-traffic oute-ai-prod \
              --region=${{ env.GCP_REGION }} \
              --to-revisions="$PREV_REV=100"
            echo "Rolled back to: $PREV_REV"
          else
            echo "No previous revision found for rollback"
          fi
