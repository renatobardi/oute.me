name: Deploy DEV

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  GCP_REGION: us-central1
  AR_REPO: oute

permissions:
  contents: read
  id-token: write

jobs:
  deploy-web:
    name: Deploy Web (DEV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push container
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          docker build \
            -f apps/web/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:${{ github.sha }} \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:${{ github.sha }}

      - name: Get AI service URL
        id: ai-url
        run: |
          URL=$(gcloud run services describe oute-ai-dev --region=${{ env.GCP_REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: oute-web-dev
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-web:${{ github.sha }}
          flags: |
            --memory=256Mi
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --vpc-connector=oute-vpc-connector
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:oute-postgres
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }}
            PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.GCP_PROJECT_ID }}.firebaseapp.com
            AI_SERVICE_URL=${{ steps.ai-url.outputs.url }}
          secrets: |
            DATABASE_URL=DATABASE_URL_DEV:latest

  deploy-ai:
    name: Deploy AI (DEV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push container
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          docker build \
            -f apps/ai/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:${{ github.sha }} \
            .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: oute-ai-dev
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/oute-ai:${{ github.sha }}
          flags: |
            --memory=1Gi
            --min-instances=0
            --max-instances=2
            --no-allow-unauthenticated
            --vpc-connector=oute-vpc-connector
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:oute-postgres
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
          env_vars: |
            ENVIRONMENT=development
            GOOGLE_CLOUD_STORAGE_BUCKET=oute-dev-uploads
          secrets: |
            DATABASE_URL=DATABASE_URL_DEV:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-ai]
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Check web health
        run: |
          URL=$(gcloud run services describe oute-web-dev --region=${{ env.GCP_REGION }} --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/")
          echo "Web health: ${STATUS}"
          [[ "$STATUS" -ge 200 && "$STATUS" -lt 400 ]]

      - name: Check AI health
        run: |
          URL=$(gcloud run services describe oute-ai-dev --region=${{ env.GCP_REGION }} --format='value(status.url)')
          TOKEN=$(gcloud auth print-identity-token --impersonate-service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} --audiences="${URL}" 2>/dev/null || true)
          if [[ -n "$TOKEN" ]]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${TOKEN}" "${URL}/health/services")
          else
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --proxy-header "Authorization: Bearer $(gcloud auth print-access-token)" "${URL}/health/services")
          fi
          echo "AI health: ${STATUS}"
          # Allow 403 on first deploy (service may need IAM propagation)
          [[ "$STATUS" -ge 200 && "$STATUS" -lt 500 ]]
