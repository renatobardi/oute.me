name: Nightly Tests

on:
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          E2E_BASE_URL: ${{ vars.DEV_URL || 'https://oute-web-dev-ujzimacvza-uc.a.run.app' }}
          E2E_FIREBASE_API_KEY: ${{ secrets.E2E_FIREBASE_API_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_NONADMIN_EMAIL: ${{ secrets.E2E_NONADMIN_EMAIL }}
          E2E_NONADMIN_PASSWORD: ${{ secrets.E2E_NONADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  slow-tests:
    name: Slow Tests (Pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - working-directory: apps/ai
        run: uv sync --extra dev
      - name: Run slow tests (with LLM calls)
        working-directory: apps/ai
        run: uv run pytest -m slow --tb=short -v || [ $? -eq 5 ]
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          # DATABASE_URL não necessário: slow tests usam LLM, não banco.
          # conftest.py define um default para evitar erros de import.

  smoke-dev:
    name: Smoke Tests (Dev)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install httpx pytest
      - name: Run smoke tests
        run: pytest tests/smoke/ -v
        env:
          DEPLOY_URL: ${{ vars.DEV_URL || 'https://oute-web-dev-ujzimacvza-uc.a.run.app' }}
