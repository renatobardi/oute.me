name: Nightly Tests

on:
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.DEV_URL || 'https://dev.oute.pro' }}
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  slow-tests:
    name: Slow Tests (Pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - working-directory: apps/ai
        run: uv sync --extra dev
      - name: Run slow tests (with LLM calls)
        working-directory: apps/ai
        run: uv run pytest -m slow --tb=short -v
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}

  smoke-dev:
    name: Smoke Tests (Dev)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install httpx pytest
      - name: Run smoke tests
        run: pytest tests/smoke/ -v
        env:
          DEPLOY_URL: ${{ vars.DEV_URL || 'https://dev.oute.pro' }}
