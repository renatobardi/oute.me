consolidate_requirements:
  description: >
    Analise o estado da entrevista e o resumo da conversa para consolidar
    todos os requisitos técnicos identificados.

    Estado da entrevista:
    {interview_state}

    Resumo da conversa:
    {conversation_summary}

    Contexto de documentos:
    {documents_context}

    Organize os requisitos em:
    1. Requisitos funcionais
    2. Requisitos não-funcionais
    3. Integrações necessárias
    4. Restrições técnicas
    5. Tecnologias mencionadas ou inferidas
  expected_output: >
    Um documento JSON com a estrutura:
    {
      "functional_requirements": ["..."],
      "non_functional_requirements": ["..."],
      "integrations": ["..."],
      "constraints": ["..."],
      "technologies": ["..."],
      "complexity_assessment": "low|medium|high|very_high"
    }
  agent: architecture_interviewer

search_similar_projects:
  description: >
    Com base nos requisitos consolidados, busque projetos similares na base
    de conhecimento vetorial E na internet.

    1. Use a ferramenta vector_search para buscar projetos anteriores na base interna.
    2. Use a ferramenta web_search para buscar na internet por:
       - Projetos de software similares e seus custos
       - Arquiteturas de referência para o tipo de projeto
       - Benchmarks de mercado para desenvolvimento de software
       - Artigos técnicos relevantes

    Requisitos consolidados:
    {consolidated_requirements}

    Gere queries de busca eficientes para cada ferramenta. Combine os resultados
    internos e externos, dando prioridade a dados internos quando disponíveis,
    mas enriquecendo com benchmarks de mercado da web.
  expected_output: >
    Um documento JSON com:
    {
      "similar_projects": [
        {
          "summary": "...",
          "relevance_score": 0.0,
          "metrics": {"cost": 0, "duration_weeks": 0, "team_size": 0}
        }
      ],
      "market_benchmarks": {
        "avg_cost_per_hour": 0,
        "typical_duration_weeks": 0,
        "typical_team_size": 0
      }
    }
  agent: rag_analyst

design_architecture:
  description: >
    Com base nos requisitos consolidados e projetos similares, proponha
    uma arquitetura técnica e cronograma de implementação.

    Requisitos:
    {consolidated_requirements}

    Projetos similares:
    {similar_projects}

    Defina:
    1. Visão geral da arquitetura
    2. Milestones com duração, entregáveis e dependências
    3. Recomendações tecnológicas com justificativa
    4. Riscos técnicos com mitigação
  expected_output: >
    Um documento JSON com:
    {
      "architecture_overview": "...",
      "milestones": [
        {
          "name": "...",
          "description": "...",
          "duration_weeks": 0,
          "deliverables": ["..."],
          "dependencies": ["..."]
        }
      ],
      "tech_recommendations": [
        {"category": "...", "technology": "...", "justification": "..."}
      ],
      "risks": [
        {"description": "...", "impact": "high|medium|low", "mitigation": "...", "probability": "high|medium|low"}
      ]
    }
  agent: software_architect

estimate_costs:
  description: >
    Elabore 3 cenários financeiros com base nos dados abaixo.

    ## Arquitetura e Milestones
    {architecture}
    → Extraia: número de milestones, duração total em semanas, complexidade
      de cada milestone, número de integrações externas.

    ## Projetos Similares e Benchmarks de Mercado
    {similar_projects}
    → Extraia: custo médio, duração média, tamanho médio da equipe,
      taxa horária média (avg_cost_per_hour).

    ## Método de Cálculo
    Para cada cenário (conservador, moderado, otimista):
    1. Calcule total_hours somando as horas por milestone. Cada milestone:
       horas = duration_weeks × team_size × 40h × utilization (0.70-0.85).
    2. Defina hourly_rate baseado na complexidade e benchmarks de mercado.
    3. Calcule total_cost = total_hours × hourly_rate (exato).
    4. Defina team_size considerando: conservador usa equipe menor,
       otimista usa equipe maior e mais experiente.
    5. Calcule duration_weeks = total_hours / (team_size × horas_semanais).
    6. Defina confidence seguindo os ranges do seu perfil.

    ## Diferenciação entre Cenários
    - Conservador: assume riscos se materializando, equipe júnior-pleno,
      mais tempo para revisões, buffer de contingência de 30-50%.
    - Moderado: cenário mais provável, equipe pleno-sênior mista, buffer de 10-15%.
    - Otimista: assume execução ideal, equipe sênior, sem impedimentos, buffer mínimo.

    ## Regras
    - Moeda: BRL (Real brasileiro).
    - total_cost DEVE ser exatamente total_hours × hourly_rate.
    - Confidence do conservador > moderado > otimista.
    - Total_cost do conservador > moderado > otimista.
    - Duration_weeks do conservador > moderado > otimista.
  expected_output: >
    Um documento JSON com exatamente esta estrutura:
    {
      "scenarios": [
        {
          "name": "conservador",
          "description": "...",
          "total_hours": 0,
          "hourly_rate": 0.0,
          "total_cost": 0.0,
          "duration_weeks": 0.0,
          "team_size": 0,
          "confidence": 0.0,
          "currency": "BRL",
          "risk_buffer_percent": 0.0
        }
      ]
    }
    Os 3 cenários DEVEM ser: conservador, moderado, otimista (nesta ordem).
  agent: cost_specialist

review_and_summarize:
  description: >
    Revise toda a estimativa para garantir consistência interna e gere um
    sumário executivo para stakeholders.

    ## Dados de Entrada

    ### Requisitos Consolidados
    {consolidated_requirements}

    ### Arquitetura e Milestones
    {architecture}

    ### Cenários de Custo
    {cost_scenarios}

    ## Checklist de Validação

    Execute cada verificação e registre issues encontradas:

    1. **Consistência matemática**: Para cada cenário, verifique se
       total_cost = total_hours x hourly_rate (tolerância de 5%).
       Classifique desvios como category="mathematical", severity="critical".

    2. **Ordenação de cenários**: Verifique se custo e duração seguem
       conservador >= moderado >= otimista. Desvios são
       category="cost_consistency", severity="critical".

    3. **Cobertura de requisitos**: Compare cada requisito funcional com os
       deliverables dos milestones. Calcule o percentual de cobertura
       (requirements_coverage_pct). Requisitos não cobertos:
       category="requirement_coverage", severity="warning".

    4. **Cobertura de riscos**: Verifique se cada integração tem um risco
       associado. Calcule risk_coverage_pct. Integrações sem risco:
       category="risk_coverage", severity="warning".

    5. **Realismo de prazos**: Verifique se duration_weeks é compatível
       com total_hours / (team_size x 40 x 0.75). Desvios >20%:
       category="timeline_consistency", severity="warning".

    6. **Completude**: Campos vazios em architecture_overview, milestones,
       ou scenarios são category="general", severity="critical".

    Para cada issue, tente sugerir um ajuste concreto (adjustments_made)
    com o campo afetado, valor original e valor sugerido.

    ## Sumário Executivo

    Escreva 3-5 parágrafos em português formal para decisores de negócio:
    1. Visão geral do projeto e escopo
    2. Arquitetura proposta e milestones principais
    3. Faixa de investimento com os 3 cenários (valores em BRL)
    4. Riscos principais e mitigações
    5. Recomendação e próximos passos (opcional)
  expected_output: >
    Um documento JSON com exatamente esta estrutura:
    {
      "validation": {
        "is_consistent": true,
        "issues_found": [
          {
            "category": "cost_consistency|timeline_consistency|requirement_coverage|risk_coverage|mathematical|general",
            "severity": "critical|warning|info",
            "description": "...",
            "affected_agent": "cost_specialist|software_architect|...",
            "resolved": false
          }
        ],
        "adjustments_made": [
          {
            "description": "...",
            "field_adjusted": "...",
            "original_value": "...",
            "adjusted_value": "...",
            "reason": "..."
          }
        ],
        "requirements_coverage_pct": 85.0,
        "risk_coverage_pct": 70.0
      },
      "executive_summary": "..."
    }
  agent: reviewer

prepare_knowledge:
  description: >
    Prepare os dados da estimativa para armazenamento na base de conhecimento
    vetorial, otimizando para busca por similaridade.

    Os dados de entrada estão disponíveis no contexto dos agentes anteriores:
    requisitos consolidados, arquitetura, cenários de custo e revisão.

    ## Regras para knowledge_text

    Gere um texto corrido em português (NÃO JSON, NÃO lista) de 3-4
    parágrafos (~500-1500 palavras) contendo:

    - Parágrafo 1: Tipo de projeto, escopo principal, público-alvo,
      funcionalidades-chave.
    - Parágrafo 2: Stack tecnológica, arquitetura proposta, integrações
      externas e suas complexidades.
    - Parágrafo 3: Faixa de investimento (do cenário otimista ao
      conservador em BRL), prazo estimado em semanas, tamanho de equipe.
    - Parágrafo 4: Nível de complexidade, riscos principais, diferenciais
      do projeto.

    Use palavras-chave relevantes para busca semântica: nome das
    tecnologias, tipo de projeto, domínio de negócio. Evite jargão
    interno ou referências a IDs.

    ## Regras para metadata

    - project_type: categoria clara (ex: "e-commerce", "saas", "marketplace").
    - technologies: lista das principais tecnologias da arquitetura.
    - complexity: use o mesmo valor de complexity_assessment dos requisitos
      ("low", "medium", "high" ou "very_high").
    - cost_range: {"min": custo_otimista, "max": custo_conservador} em BRL.
    - duration_range: {"min": semanas_otimista, "max": semanas_conservador}.
    - team_size_range: {"min": equipe_otimista, "max": equipe_conservador}.
    - integrations_count: total de integrações externas identificadas.
    - requirements_count: total de requisitos funcionais.
  expected_output: >
    Um documento JSON com exatamente esta estrutura:
    {
      "knowledge_text": "Texto corrido em parágrafos descrevendo o projeto...",
      "metadata": {
        "project_type": "...",
        "technologies": ["..."],
        "complexity": "low|medium|high|very_high",
        "cost_range": {"min": 0.0, "max": 0.0},
        "duration_range": {"min": 0.0, "max": 0.0},
        "team_size_range": {"min": 0, "max": 0},
        "integrations_count": 0,
        "requirements_count": 0
      }
    }
  agent: knowledge_manager
