target-version = "py312"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "ASYNC", # flake8-async
    "S",     # flake8-bandit
    "T20",   # flake8-print
    "RUF",   # ruff-specific
]
ignore = [
    "S101", # allow assert in tests
]

[lint.per-file-ignores]
"src/services/prompts.py" = ["E501"]

[lint.isort]
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
