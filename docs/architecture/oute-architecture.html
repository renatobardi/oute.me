<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oute.pro — Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ──────────────────────────────────── */
    :root {
      --bg:         #0b0d14;
      --surface:    #12151f;
      --surface-2:  #1a1d2e;
      --border:     #252840;
      --primary:    #6366f1;
      --primary-lo: rgba(99,102,241,.12);
      --text:       #e2e8f0;
      --muted:      #64748b;
      --font:       'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Reset ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 72px;
      gap: 36px;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .wordmark {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
    }

    .wordmark span { color: var(--primary); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .3px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
    }

    .badge-purple { background: var(--primary-lo); border: 1px solid var(--primary); color: #a5b4fc; }
    .badge-gray   { background: rgba(100,116,139,.1); border: 1px solid #334155; color: var(--muted); }

    /* ── Card wrapper ────────────────────────────── */
    .card {
      width: 100%;
      max-width: 1080px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 28px 20px;
      box-shadow:
        0 0 0 1px rgba(99,102,241,.04),
        0 8px 48px rgba(0,0,0,.5);
    }

    svg#diagram {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* ── Node hover (CSS) ───────────────────────── */
    .node { cursor: pointer; }
    .node rect, .node ellipse {
      transition: filter .18s, stroke-opacity .18s;
    }
    .node:hover rect, .node:hover ellipse {
      filter: brightness(1.22) drop-shadow(0 0 8px currentColor);
    }

    /* ── Edges ───────────────────────────────────── */
    .edge {
      fill: none;
      stroke-width: 1.5;
      transition: stroke-opacity .2s, stroke-width .2s;
    }
    .edge.dimmed    { stroke-opacity: .1; }
    .edge.lit       { stroke-width: 2.5; filter: drop-shadow(0 0 3px currentColor); }
    .elabel {
      font: 500 10px/1 'Inter', sans-serif;
      fill: var(--muted);
      pointer-events: none;
    }

    /* ── Layer labels ────────────────────────────── */
    .llabel {
      font: 600 10px/1 'Inter', sans-serif;
      fill: #334155;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Legend ──────────────────────────────────── */
    .legend {
      display: flex;
      gap: 28px;
      justify-content: center;
      padding-top: 20px;
      flex-wrap: wrap;
    }

    .li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--muted);
    }

    .lline {
      width: 28px;
      height: 0;
      border: none;
    }

    /* ── Tooltip ─────────────────────────────────── */
    #tip {
      position: fixed;
      z-index: 999;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 15px;
      max-width: 240px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .15s, transform .15s;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    #tip.show { opacity: 1; transform: translateY(0); }
    #tip strong {
      display: block;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    #tip p {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ── Footer ──────────────────────────────────── */
    footer {
      font-size: 11px;
      color: #2d3555;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────── -->
<header>
  <div class="wordmark">oute<span>.me</span></div>
  <p class="subtitle">System Architecture — SaaS de estimativa de projetos com IA</p>
  <div class="badge-row">
    <span class="badge badge-purple">SvelteKit 5 + FastAPI</span>
    <span class="badge badge-gray">GCP · Cloud Run · PostgreSQL + pgvector</span>
    <span class="badge badge-gray">ADR-01 … ADR-08</span>
  </div>
</header>

<!-- ── Diagram card ──────────────────────────────── -->
<div class="card">
  <svg id="diagram" viewBox="0 0 1020 750" xmlns="http://www.w3.org/2000/svg">
    <defs>

      <!-- Arrowheads -->

        <path d="M0,0 L0,7 L7,3.5 z" fill="#475569"/>
      </marker>
      <marker id="ah-pri" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#818cf8"/>
      </marker>
      <marker id="ah-red" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#f87171"/>
      </marker>
      <marker id="ah-yel" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#fbbf24"/>
      </marker>
      <marker id="ah-teal" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">

      </marker>
      <marker id="ah-grn" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">

      </marker>
      <marker id="ah-ora" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#fb923c"/>
      </marker>

      <!-- Node gradients -->

        <stop offset="100%" stop-color="#1e40af" stop-opacity=".8"/>
      </linearGradient>
      <linearGradient id="g-ind" x1="0%" y1="0%" x2="100%" y2="100%">

      </linearGradient>
      <linearGradient id="g-ind-w" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#1e1b4b"/>
        <stop offset="100%" stop-color="#4338ca" stop-opacity=".7"/>
      </linearGradient>
      <linearGradient id="g-ora" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#7c2d12"/>
        <stop offset="100%" stop-color="#c2410c" stop-opacity=".8"/>
      </linearGradient>

        <stop offset="0%"   stop-color="#7f1d1d"/>
        <stop offset="100%" stop-color="#b91c1c" stop-opacity=".85"/>
      </linearGradient>
      <linearGradient id="g-grn" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#064e3b"/>

      </linearGradient>
      <linearGradient id="g-amb" x1="0%" y1="0%" x2="100%" y2="100%">

      </linearGradient>

    <!-- ── Layer separators ──────────────────────── -->

    <line x1="108" y1="168" x2="1010" y2="168" stroke="#1e2235" stroke-width="1"/>
    <line x1="108" y1="308" x2="1010" y2="308" stroke="#1e2235" stroke-width="1"/>
    <line x1="108" y1="448" x2="1010" y2="448" stroke="#1e2235" stroke-width="1"/>
    <line x1="108" y1="608" x2="1010" y2="608" stroke="#1e2235" stroke-width="1"/>

    <text class="llabel" x="10" y="242">EDGE</text>
    <text class="llabel" x="10" y="385">APP</text>
    <text class="llabel" x="10" y="520">SVC</text>
    <text class="llabel" x="10" y="675">DATA</text>

    <!-- ════════════════════════════════════════════
         EDGES  (rendered first → behind nodes)
    ═════════════════════════════════════════════ -->

    <!-- browser → oute.pro (domínio primário) -->
    <path id="e-br-pro" class="edge" stroke="#818cf8"
          d="M 508 130 C 508 148 508 148 508 168"
          marker-end="url(#ah-pri)"

    <!-- oute.pro → SvelteKit -->

          d="M 308 488 L 380 488"

    <path id="e-fa-pg" class="edge" stroke="#2dd4bf"
          d="M 178 518 C 178 568 208 580 208 608"
          marker-end="url(#ah-teal)"
          data-from="fastapi" data-to="postgres"/>

    <!-- FastAPI → Redis (job state) -->
    <path id="e-fa-rd" class="edge" stroke="#fb923c"
          d="M 236 518 C 236 570 530 570 530 608"
          marker-end="url(#ah-ora)"
          data-from="fastapi" data-to="redis"/>

    <!-- FastAPI → GCS (dashed) -->
    <path id="e-fa-gcs" class="edge" stroke="#38bdf8" stroke-dasharray="5 3"
          d="M 264 518 C 264 580 840 584 840 608"
          marker-end="url(#ah-sky)"
          data-from="fastapi" data-to="gcs"/>

    <!-- ── Edge labels ─────────────────────────── -->
    <text class="elabel" x="508" y="154">HTTPS</text>
    <text class="elabel" x="202" y="416">proxy SSE</text>
    <text class="elabel" x="820" y="416">verifica token</text>
    <text class="elabel" x="285" y="485">SQL direto</text>
    <text class="elabel" x="726" y="480">upload</text>
    <text class="elabel" x="330" y="482">LLM</text>
    <text class="elabel" x="128" y="568">pgvector</text>
    <text class="elabel" x="378" y="568">job state</text>

    <!-- ════════════════════════════════════════════
         NODES
    ═════════════════════════════════════════════ -->

    <!-- ── L1 · Client ─────────────────────────── -->
    <g class="node" id="browser"
       data-t="Browser / Cliente"
       data-b="Acessa via oute.pro. Firebase Auth SDK (cliente) para login. Token enviado no header de cada request ao BFF.">
      <rect x="370" y="52" width="276" height="68" rx="12" fill="url(#g-blu)" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="508" y="80"  text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Browser / Cliente</text>
      <text x="508" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#93c5fd">Firebase Auth SDK (cliente)</text>
    </g>

    <!-- ── L2 · Edge ────────────────────────────── -->
    <g class="node" id="outepro"
       data-t="oute.pro"
       data-b="Domínio único. A records → Google IPs + CNAME www → ghs.googlehosted.com. Domain mapping no Cloud Run prod. TLS automático via GCP.">
      <rect x="396" y="168" width="224" height="68" rx="12" fill="url(#g-ind)" stroke="#6366f1" stroke-width="1.5"/>
      <text x="508" y="196" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">oute.pro</text>
      <text x="508" y="216" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#c7d2fe">GCP Cloud Run · domain mapping</text>
    </g>

    <!-- ── L3 · App ─────────────────────────────── -->
    <g class="node" id="sveltekit"
       data-t="SvelteKit 5 — BFF + Frontend"
       data-b="Único ponto de acesso externo ao PostgreSQL. Autentica token Firebase (Admin SDK) antes de qualquer operação. Faz proxy SSE para o FastAPI AI Service. Porta 5173 (dev).">

      <!-- inner highlight line -->
      <line x1="196" y1="318" x2="826" y2="318" stroke="#4338ca" stroke-width="1" opacity=".5"/>
      <text x="511" y="337" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#fff">SvelteKit 5</text>
      <text x="511" y="358" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a5b4fc">BFF + Frontend · porta 5173 · único acesso ao banco · SSE proxy</text>
    </g>

    <!-- ── L4 · Services ────────────────────────── -->
    <g class="node" id="fastapi"
       data-t="FastAPI AI Service"
       data-b="Serviço interno — sem endpoints públicos. Dois modos: SSE conversacional (Gemini SDK direto, baixa latência) e batch CrewAI para estimativas (~90–130 s). Porta 8000.">

      <text x="204" y="476" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">FastAPI</text>
      <text x="204" y="496" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#fca5a5">AI Service · interno · porta 8000</text>
    </g>

    <g class="node" id="gemini"
       data-t="Gemini 2.5 Flash-Lite"
       data-b="LLM principal para chat SSE turn-by-turn. text-embedding-004 (768 dims) para embeddings armazenados no pgvector. Via google-generativeai SDK.">

      <text x="492" y="476" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Gemini 2.5 Flash-Lite</text>

    <g pointer-events="none">
      <rect x="98" y="612" width="58" height="16" rx="4" fill="#134e4a" opacity=".9"/>
      <text x="127" y="623" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#5eead4">pgvector</text>

  </svg>

  <!-- Legend inside card -->
  <div class="legend">
    <div class="li">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#64748b" stroke-width="1.8"/><path d="M22,3 L28,6 L22,9" fill="#64748b"/></svg>

      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#64748b" stroke-width="1.8" stroke-dasharray="4 3"/><path d="M22,3 L28,6 L22,9" fill="#64748b"/></svg>
      <span>Proxy / interno / upload</span>

<!-- ── Tooltip ────────────────────────────────────── -->
<div id="tip"></div>

<script>
  /* ── Data ─────────────────────────────────────────
     Centralised so this file works as a future template:
     swap NODES/EDGES for another project, keep the rest.
  ─────────────────────────────────────────────────── */
  const NODES = document.querySelectorAll('.node');
  const EDGES = document.querySelectorAll('.edge');
  const tip   = document.getElementById('tip');

  /* ── Tooltip ──────────────────────────────────── */
  let tx = 0, ty = 0;

  NODES.forEach(n => {
    n.addEventListener('mouseenter', e => {
      const title = n.dataset.t;
      const body  = n.dataset.b;
      if (!title) return;
      tip.innerHTML = `<strong>${title}</strong><p>${body}</p>`;
      tip.classList.add('show');
      highlight(n.id);
    });

    n.addEventListener('mousemove', e => {
      tx = e.clientX; ty = e.clientY;
      positionTip();
    });

    n.addEventListener('mouseleave', () => {
      tip.classList.remove('show');
      reset();
    });
  });

  function positionTip() {
    const tw = tip.offsetWidth;
    const th = tip.offsetHeight;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let x = tx + 18;
    let y = ty - 10;
    if (x + tw > vw - 12) x = tx - tw - 18;
    if (y + th > vh - 12) y = vh - th - 12;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  /* ── Edge highlight ───────────────────────────── */
  function highlight(id) {
    EDGES.forEach(e => {
      const connected = e.dataset.from === id || e.dataset.to === id;
      e.classList.toggle('lit',    connected);
      e.classList.toggle('dimmed', !connected);
    });
  }

  function reset() {
    EDGES.forEach(e => e.classList.remove('lit', 'dimmed'));
  }
</script>
